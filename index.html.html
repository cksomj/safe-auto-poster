<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safe Auto Poster Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f3f6ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1f2937;
    }

    .header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      padding: 30px 20px 74px;
    }

    .header h1 { font-size: 22px; margin-bottom: 8px; }
    .header p { opacity: 0.9; font-size: 14px; }

    .container {
      max-width: 760px;
      margin: auto;
      padding: 0 16px 40px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      background: white;
      padding: 6px;
      border-radius: 16px;
      margin-top: -44px;
      margin-bottom: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
    }

    .tab-btn {
      flex: 1;
      border: none;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      background: transparent;
      color: #6b7280;
      transition: all .2s;
    }

    .tab-btn.active {
      background: #4f46e5;
      color: white;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,.06);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #4b5563;
    }

    input, select {
      width: 100%;
      padding: 13px;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1.5px solid #dbe2ea;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }

    input:focus, select:focus { border-color: #4f46e5; }

    .btn-main {
      width: 100%;
      border: none;
      padding: 14px;
      border-radius: 12px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
      transition: opacity .2s;
    }

    .btn-upload {
      width: 100%;
      border: none;
      padding: 14px;
      border-radius: 12px;
      background: #21759b;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
      margin-top: 16px;
      transition: opacity .2s;
    }

    .btn-main:hover, .btn-upload:hover { opacity: 0.88; }
    .btn-main:disabled, .btn-upload:disabled { opacity: 0.6; cursor: not-allowed; }

    .preview {
      background: #f8fafc;
      border-radius: 14px;
      padding: 18px;
      margin-top: 18px;
      display: none;
    }

    .preview h3 { margin-bottom: 8px; font-size: 16px; }
    .preview .excerpt { font-size: 12px; color: #6b7280; margin-bottom: 14px; }
    .preview-content h2 { font-size: 15px; margin: 14px 0 6px; color: #1f2937; }
    .preview-content p { font-size: 14px; color: #374151; line-height: 1.6; }
    .preview-content ul { padding-left: 18px; font-size: 14px; color: #374151; line-height: 1.8; }

    .msg {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 14px;
      display: none;
    }

    .msg.success { background: #dcfce7; color: #166534; display: block; }
    .msg.error { background: #fee2e2; color: #991b1b; white-space: pre-wrap; display: block; }
  </style>
</head>
<body>

<div class="header">
  <div class="container">
    <h1>🚀 Safe Auto Poster Pro</h1>
    <p>보안 강화 + 실운영 안정화 버전입니다.</p>
  </div>
</div>

<div class="container">

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab(0)">✍️ 글 생성</button>
    <button class="tab-btn" onclick="switchTab(1)">⚙️ 설정</button>
  </div>

  <!-- 글 생성 탭 -->
  <div class="tab-panel active" id="tab-0">
    <div class="card">

      <div class="msg" id="msg-gen"></div>

      <label>카테고리</label>
      <input type="text" id="category" maxlength="40" placeholder="예: IT, 건강" />

      <label>메인 키워드</label>
      <input type="text" id="keyword" maxlength="80" placeholder="예: 챗GPT 사용법" />

      <button class="btn-main" id="btn-gen" onclick="generatePost()">🚀 글 생성하기</button>

      <div class="preview" id="preview">
        <h3 id="preview-title"></h3>
        <p class="excerpt" id="preview-excerpt"></p>
        <div class="preview-content" id="preview-content"></div>
        <button class="btn-upload" id="btn-upload" onclick="uploadPost()">🌐 워드프레스 업로드</button>
      </div>

    </div>
  </div>

  <!-- 설정 탭 -->
  <div class="tab-panel" id="tab-1">
    <div class="card">

      <label>백엔드 API 주소</label>
      <input type="url" id="apiEndpoint" placeholder="https://api.example.com/post" />

      <label>워드프레스 주소</label>
      <input type="url" id="wordpressUrl" placeholder="https://myblog.com" />

      <label>게시 상태</label>
      <select id="postStatus">
        <option value="draft">임시 저장</option>
        <option value="publish">즉시 발행</option>
      </select>

      <button class="btn-main" onclick="saveConfig()">💾 설정 저장</button>

    </div>
  </div>

</div>

<script>
  var generatedPost = null;

  function switchTab(idx) {
    var btns = document.querySelectorAll('.tab-btn');
    var panels = document.querySelectorAll('.tab-panel');
    btns.forEach(function(b, i) { b.classList.toggle('active', i === idx); });
    panels.forEach(function(p, i) { p.classList.toggle('active', i === idx); });
  }

  function showMsg(type, text) {
    var el = document.getElementById('msg-gen');
    el.className = 'msg ' + type;
    el.textContent = text;
  }

  function hideMsg() {
    var el = document.getElementById('msg-gen');
    el.className = 'msg';
    el.textContent = '';
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function isValidUrl(url) {
    try { new URL(url); return true; } catch(e) { return false; }
  }

  function cleanUrl(url) {
    return url.trim().replace('/wp-admin', '').replace(/\/$/, '');
  }

  function saveConfig() {
    var config = {
      apiEndpoint: document.getElementById('apiEndpoint').value,
      wordpressUrl: document.getElementById('wordpressUrl').value,
      postStatus: document.getElementById('postStatus').value
    };
    try {
      sessionStorage.setItem('SAFE_AUTO_POSTER_V2', JSON.stringify(config));
      alert('설정이 저장되었습니다.');
    } catch(e) {
      alert('저장에 실패했습니다.');
    }
  }

  function loadConfig() {
    try {
      var saved = sessionStorage.getItem('SAFE_AUTO_POSTER_V2');
      if (!saved) return;
      var config = JSON.parse(saved);
      document.getElementById('apiEndpoint').value = config.apiEndpoint || '';
      document.getElementById('wordpressUrl').value = config.wordpressUrl || '';
      document.getElementById('postStatus').value = config.postStatus || 'draft';
    } catch(e) {}
  }

  function generatePost() {
    hideMsg();

    var category = document.getElementById('category').value.trim();
    var keyword = document.getElementById('keyword').value.trim();

    if (!category) { showMsg('error', '카테고리를 입력하세요.'); return; }
    if (!keyword) { showMsg('error', '키워드를 입력하세요.'); return; }
    if (keyword.length < 2) { showMsg('error', '키워드는 2자 이상이어야 합니다.'); return; }

    var btn = document.getElementById('btn-gen');
    btn.disabled = true;
    btn.textContent = '✨ AI 작성 중입니다...';

    setTimeout(function() {
      var title = '[' + escapeHtml(category) + '] ' + escapeHtml(keyword) + ' 완벽 가이드';
      var excerpt = escapeHtml(keyword) + ' 핵심 내용을 정리한 실전 가이드입니다.';
      var content =
        '<h2>' + escapeHtml(keyword) + '란?</h2>' +
        '<p>' + escapeHtml(keyword) + ' 핵심 내용을 정리했습니다.</p>' +
        '<h2>주요 특징</h2>' +
        '<ul>' +
        '<li>초보자도 이해 가능합니다.</li>' +
        '<li>실전 활용 중심입니다.</li>' +
        '<li>최신 트렌드를 반영했습니다.</li>' +
        '</ul>' +
        '<h2>마무리</h2>' +
        '<p>충분한 정보를 검토한 뒤 활용하세요.</p>';

      generatedPost = { title: title, excerpt: excerpt, content: content };

      document.getElementById('preview-title').textContent = title;
      document.getElementById('preview-excerpt').textContent = excerpt;
      document.getElementById('preview-content').innerHTML = content;
      document.getElementById('preview').style.display = 'block';

      showMsg('success', '✅ 글 생성이 완료되었습니다.');

      btn.disabled = false;
      btn.textContent = '🚀 글 생성하기';
    }, 1200);
  }

  function uploadPost() {
    if (!generatedPost) return;

    var apiEndpoint = document.getElementById('apiEndpoint').value.trim();
    var wordpressUrl = document.getElementById('wordpressUrl').value.trim();
    var postStatus = document.getElementById('postStatus').value;

    if (!apiEndpoint) { showMsg('error', '설정 탭에서 백엔드 API 주소를 입력하세요.'); return; }
    if (!isValidUrl(apiEndpoint)) { showMsg('error', '올바른 API 주소를 입력하세요.'); return; }
    if (!isValidUrl(wordpressUrl)) { showMsg('error', '올바른 워드프레스 주소를 입력하세요.'); return; }

    var btn = document.getElementById('btn-upload');
    btn.disabled = true;
    btn.textContent = '🌐 업로드 중입니다...';

    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 10000);

    fetch(apiEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller.signal,
      body: JSON.stringify({
        wordpressUrl: cleanUrl(wordpressUrl),
        title: generatedPost.title,
        excerpt: generatedPost.excerpt,
        content: generatedPost.content,
        status: postStatus
      })
    })
    .then(function(res) {
      return res.text().then(function(text) {
        var data = {};
        try { data = JSON.parse(text); } catch(e) { throw new Error('JSON 응답 파싱 실패.'); }
        if (!res.ok) throw new Error(data.message || '업로드 실패.');
        showMsg('success', '✅ 워드프레스 업로드 성공!');
      });
    })
    .catch(function(err) {
      if (err.name === 'AbortError') showMsg('error', '요청 시간이 초과되었습니다.');
      else showMsg('error', '오류: ' + err.message);
    })
    .finally(function() {
      clearTimeout(timeout);
      btn.disabled = false;
      btn.textContent = '🌐 워드프레스 업로드';
    });
  }

  loadConfig();
</script>

</body>
</html>
