<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>애드센스 승인 자동화 - Ollama 로컬 AI</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f0f4ff;font-family:Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1e1b4b}button,input,textarea,select{font-family:inherit}.hero{background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:20px 20px 60px;color:#fff}.hero h1{margin:0 0 4px;font-size:20px}.hero p{margin:0;font-size:13px;opacity:.85}.wrap{max-width:720px;margin:-36px auto 0;padding:0 16px 32px}.tabs{background:#fff;border-radius:16px;padding:6px;box-shadow:0 4px 20px rgba(0,0,0,.1);margin-bottom:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px}.tab{padding:9px 4px;border-radius:12px;border:0;background:transparent;color:#6b7280;font-weight:700;font-size:11px;cursor:pointer}.tab.active{background:#4f46e5;color:#fff}.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:14px}.title{font-weight:800;font-size:15px;margin-bottom:14px}.label{font-size:13px;font-weight:700;color:#4b5563;display:block;margin-bottom:6px}.input,.textarea,.select{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #e5e7eb;font-size:14px;outline:none;margin-bottom:14px;background:#fff}.textarea{min-height:110px;resize:vertical}.btn{width:100%;padding:13px;border-radius:12px;border:0;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-weight:800;font-size:15px;cursor:pointer}.btn.secondary{background:#fff;color:#4f46e5;border:2px solid #4f46e5}.btn.green{background:#059669}.btn.orange{background:#ea580c}.btn:disabled{background:#d1d5db;cursor:not-allowed}.notice{background:#eff6ff;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#1d4ed8;line-height:1.6}.warn{background:#fff7ed;border:1.5px solid #fb923c;border-radius:14px;padding:16px;margin-bottom:16px;color:#92400e;font-size:13px;line-height:1.7}.error{background:#fee2e2;border:1.5px solid #fca5a5;border-radius:12px;padding:12px 14px;margin-bottom:14px;color:#b91c1c;font-size:13px;line-height:1.6}.okbox{background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:12px 14px;margin-bottom:14px;color:#166534;font-size:13px;line-height:1.6}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.metric{text-align:center;border-radius:10px;padding:12px 8px}.metric.ok{background:#f0fdf4}.metric.bad{background:#fff7ed}.metric strong{display:block;font-size:17px}.fieldbox{background:#f8fafc;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px;line-height:1.8}.content{max-height:360px;overflow:auto}.photo{background:#ede9fe;border:1.5px dashed #7c3aed;border-radius:8px;padding:8px 12px;margin:10px 0;font-size:12px;color:#5b21b6}.row{display:flex;gap:8px;align-items:center}.pill{border:2px solid #e5e7eb;background:#fff;color:#6b7280;border-radius:10px;padding:10px 0;font-weight:800;cursor:pointer;flex:1}.pill.active{border-color:#4f46e5;background:#ede9fe;color:#4f46e5}.schedule-day{font-size:12px;font-weight:800;color:#4f46e5;background:#ede9fe;padding:4px 10px;border-radius:6px;display:inline-block;margin:8px 0}.post-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f8fafc;border-radius:8px;margin-bottom:6px}.num{width:22px;height:22px;border-radius:50%;background:#4f46e5;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}.small{font-size:12px;color:#6b7280}.template pre{background:#f8fafc;border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.7;white-space:pre-wrap;word-break:break-word;overflow:auto;color:#374151}.tag{color:#fff;font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px}.hidden{display:none!important}.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px;margin-right:6px}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:560px){.tabs{grid-template-columns:repeat(2,1fr)}.grid2,.grid3{grid-template-columns:1fr}.row{flex-wrap:wrap}}
  </style>
</head>
<body>
<header class="hero"><h1>📝 애드센스 승인 자동화</h1><p>Ollama 로컬 AI 연결 · 글 생성 · 스케줄 · 트래커</p></header>
<main class="wrap"><nav class="tabs" id="tabs"></nav><section id="app"></section></main>
<script>
(function(){
  const TABS=['✍️ 글 생성','📅 발행 스케줄러','💡 프롬프트','📊 포스팅 트래커'];
  const DEFAULT_URL='http://localhost:11434';
  const store={get(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};
  const state={tab:0,result:null,checked:{},loading:false,models:[],schedule:store.get('ads_schedule',[]),tracker:store.get('ads_tracker',[])};
  const rules=[['category','카테고리 1개만 운영','단일 주제 블로그처럼 보여야 함'],['style','문체: 합쇼체 사용','~했습니다, ~합니다 형식'],['photo','사진 1~2장만 사용','글과 관련된 이미지만'],['keyword','제목 앞에 메인 키워드 배치','제목 총 15~20자 내외'],['desc','디스크립션 160자 내외','메인 키워드 포함'],['h2','소제목은 H2 태그','소제목당 500자, 총 1,500자 이상'],['posts','최소 20개 이상 포스팅','1일 2~3회, 1시간 간격 예약 발행'],['nolink','승인 전 쿠팡 링크 금지','외부 수익 링크 제거']];
  const templates=[['애드센스 정보성 글','기본','#4f46e5',`당신은 구글 애드센스 승인을 목표로 하는 블로그 글 작성 전문가입니다.\n주제: [주제 입력]\n메인 키워드: [키워드 입력]\n조건: 제목은 키워드 앞 배치, 디스크립션 150~160자, 본문은 합쇼체, H2 소제목 3개 이상, 총 1500자 이상, 사진 위치는 [사진 삽입: 설명] 최대 2곳으로 표시해 주십시오.`],['SEO 강화형','SEO','#059669',`당신은 SEO 전문 블로그 작가입니다.\n메인 키워드: [키워드 입력]\n서브 키워드 3개를 자연스럽게 포함하고, H2 소제목 3개와 FAQ를 포함해 1500자 이상 합쇼체로 작성해 주십시오.`]];
  const $=s=>document.querySelector(s); const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const strip=s=>String(s||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  function safeHTML(html){return String(html||'').replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi,'').replace(/on\w+\s*=\s*["'][^"']*["']/gi,'');}
  function initTabs(){ $('#tabs').innerHTML=TABS.map((t,i)=>`<button class="tab ${i===state.tab?'active':''}" data-tab="${i}">${t}</button>`).join(''); document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.tab=+b.dataset.tab;state.result=null;render()}); }
  function render(){initTabs();[renderGenerator,renderScheduler,renderPrompt,renderTracker][state.tab]();}
  function ollamaUrl(){return ($('#ollamaUrl')?.value||localStorage.getItem('ollama_url')||DEFAULT_URL).replace(/\/$/,'')}
  function modelName(){return ($('#modelName')?.value||localStorage.getItem('ollama_model')||'qwen3.5:9B-Unsloth-UD-Q4_K_XL').trim()}
  async function testOllama(){const url=ollamaUrl(); localStorage.setItem('ollama_url',url); try{const r=await fetch(url+'/api/tags'); if(!r.ok) throw new Error('HTTP '+r.status); const data=await r.json(); state.models=(data.models||[]).map(m=>m.name); $('#connMsg').className='okbox'; $('#connMsg').innerHTML='✅ Ollama 연결 성공: '+(state.models.length?state.models.join(', '):'모델 목록 없음'); drawModelList();}catch(e){$('#connMsg').className='error'; $('#connMsg').innerHTML='❌ Ollama 연결 실패<br>1) Ollama가 실행 중인지 확인하세요.<br>2) PowerShell에서 <b>ollama serve</b> 실행 후 다시 테스트하세요.<br>3) 그래도 안 되면 CORS 문제일 수 있어 아래 설명을 참고하세요.';}}
  function drawModelList(){const sel=$('#modelSelect'); if(!sel)return; sel.innerHTML='<option value="">직접 입력 사용</option>'+state.models.map(m=>`<option value="${esc(m)}">${esc(m)}</option>`).join(''); sel.onchange=()=>{if(sel.value) $('#modelName').value=sel.value;};}
  function buildPrompt(category,keyword,extra){return `너는 구글 애드센스 승인을 목표로 하는 한국어 블로그 글 작성 전문가입니다. 반드시 순수 JSON만 출력하십시오. 마크다운 코드블록은 쓰지 마십시오.\n\n카테고리: ${category}\n메인 키워드: ${keyword}\n추가 요청: ${extra||'없음'}\n\n작성 규칙:\n- 제목은 메인 키워드를 맨 앞에 배치하고 15~22자 내외로 작성\n- 디스크립션은 메인 키워드를 포함해 150~165자 내외로 작성\n- 본문은 합쇼체(~합니다, ~했습니다)만 사용\n- 본문은 HTML 형식으로 작성: <h2> 소제목 3개 이상, 각 소제목 아래 <p> 문단\n- 총 본문은 한국어 기준 1500자 이상\n- 사진 위치는 최대 2곳만 [사진 삽입: 설명] 형태로 넣기\n- 쿠팡/제휴/외부 수익 링크 금지\n\n출력 JSON 형식:\n{"title":"","description":"","body":""}`;}
  async function generateWithOllama(){const cat=$('#category').value.trim(), key=$('#keyword').value.trim(), extra=$('#extra').value.trim(), url=ollamaUrl(), model=modelName(); if(!cat||!key){showErr('카테고리와 키워드를 모두 입력해주세요.');return} localStorage.setItem('ollama_url',url); localStorage.setItem('ollama_model',model); state.loading=true; drawGenForm(); try{const res=await fetch(url+'/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model,prompt:buildPrompt(cat,key,extra),stream:false,format:'json',options:{temperature:0.7,num_ctx:8192}})}); if(!res.ok) throw new Error('Ollama HTTP '+res.status); const data=await res.json(); let text=data.response||''; let parsed; try{parsed=JSON.parse(text)}catch{const m=text.match(/\{[\s\S]*\}/); if(!m) throw new Error('JSON 파싱 실패'); parsed=JSON.parse(m[0]);} state.result={title:parsed.title||'',description:parsed.description||'',body:safeHTML(parsed.body||'')}; state.loading=false; drawResult(); }catch(e){state.loading=false; drawGenForm(); showErr('생성 실패: '+e.message+'<br><br>해결: Ollama 실행 여부, 모델 이름, CORS 설정을 확인하세요.');}}
  function showErr(msg){const el=$('#err'); if(el){el.className='error';el.innerHTML=msg}}
  function renderGenerator(){ $('#app').innerHTML='<div id="genBox"></div>'; state.result?drawResult():drawGenForm(); }
  function drawGenForm(){ $('#genBox').innerHTML=`<div class="card"><div class="title">🤖 Ollama 로컬 AI 설정</div><label class="label">Ollama 주소</label><input id="ollamaUrl" class="input" value="${esc(localStorage.getItem('ollama_url')||DEFAULT_URL)}"><div class="grid2"><div><label class="label">설치된 모델 선택</label><select id="modelSelect" class="select"><option>먼저 연결 테스트</option></select></div><div><label class="label">사용할 모델명</label><input id="modelName" class="input" value="${esc(localStorage.getItem('ollama_model')||'qwen3.5:9B-Unsloth-UD-Q4_K_XL')}"></div></div><button id="testBtn" class="btn secondary">🔌 Ollama 연결 테스트</button><div id="connMsg" style="margin-top:12px"></div></div><div class="card"><div class="title">🔑 블로그 정보 입력</div><label class="label">카테고리 / 주제</label><input id="category" class="input" placeholder="예: 건강, 누수, 방수, 재테크"><label class="label">메인 키워드</label><input id="keyword" class="input" placeholder="예: 속초 누수탐지"><label class="label">추가 요청사항</label><textarea id="extra" class="textarea" placeholder="예: 주부가 이해하기 쉽게, 사례 중심으로 작성"></textarea><div id="err"></div><div class="notice">💡 생성은 내 컴퓨터의 Ollama가 처리합니다. API 비용은 없지만, Ollama가 실행 중이어야 합니다.</div><button id="gen" class="btn" ${state.loading?'disabled':''}>${state.loading?'<span class="spinner"></span>로컬 AI 생성 중...':'🚀 로컬 AI로 초안 생성'}</button></div>`; drawModelList(); $('#testBtn').onclick=testOllama; $('#gen').onclick=generateWithOllama; }
  function drawResult(){const r=state.result, bodyText=strip(r.body), metrics=[['제목',r.title.length,15,24],['디스크립션',r.description.length,140,175],['본문',bodyText.length,1400,99999]]; $('#genBox').innerHTML=`<div class="card"><div class="title">📊 품질 지표</div><div class="grid3">${metrics.map(m=>`<div class="metric ${m[1]>=m[2]&&m[1]<=m[3]?'ok':'bad'}"><strong>${m[1]}자</strong><span>${m[0]}</span><br><small>${m[1]>=m[2]&&m[1]<=m[3]?'✅ 적합':'⚠️ 확인'}</small></div>`).join('')}</div></div><div class="card"><div class="title">📄 생성된 콘텐츠</div><div class="small">제목</div><div class="fieldbox">${esc(r.title)}</div><div class="small">디스크립션</div><div class="fieldbox">${esc(r.description)}</div><div class="small">본문</div><div class="fieldbox content">${safeHTML(r.body).replace(/\[사진 삽입: ?([^\]]+)\]/g,'<div class="photo">📷 사진 삽입: $1</div>')}</div><div class="row"><button id="copyAll" class="btn green">📋 전체 복사</button><button id="newGen" class="btn secondary">🔄 새 글</button></div></div><div class="card"><div class="title">✅ 승인 체크리스트</div>${rules.map(x=>`<label class="row" style="padding:8px 0;border-bottom:1px solid #f3f4f6"><input type="checkbox" data-rule="${x[0]}" ${state.checked[x[0]]?'checked':''}><span><b>${x[1]}</b><br><small>${x[2]}</small></span></label>`).join('')}</div>`; $('#copyAll').onclick=()=>navigator.clipboard?.writeText(`제목: ${r.title}\n\n디스크립션: ${r.description}\n\n본문:\n${strip(r.body)}`); $('#newGen').onclick=()=>{state.result=null;drawGenForm()}; document.querySelectorAll('[data-rule]').forEach(c=>c.onchange=()=>state.checked[c.dataset.rule]=c.checked);}
  function renderScheduler(){ $('#app').innerHTML=`<div class="card"><div class="title">📅 자동 스케줄 생성</div><label class="label">시작 날짜</label><input id="startDate" type="date" class="input"><label class="label">하루 발행 횟수</label><div class="row"><button class="pill active" data-per="2">1일 2회</button><button class="pill" data-per="3">1일 3회</button></div><div class="notice" id="slotText" style="margin-top:14px">⏰ 09:00 / 11:00</div><button id="makeSchedule" class="btn">⚡ 20개 스케줄 자동 생성</button></div><div id="scheduleList"></div>`; let per=2; document.querySelectorAll('[data-per]').forEach(b=>b.onclick=()=>{per=+b.dataset.per;document.querySelectorAll('[data-per]').forEach(x=>x.classList.toggle('active',x===b));$('#slotText').textContent=per===2?'⏰ 09:00 / 11:00':'⏰ 09:00 / 11:30 / 14:00'}); $('#makeSchedule').onclick=()=>{const v=$('#startDate').value;if(!v)return;const slots=per===2?['09:00','11:00']:['09:00','11:30','14:00'];let d=new Date(v+'T00:00:00'),list=[],n=1;while(n<=20){for(let i=0;i<per&&n<=20;i++){list.push({id:n,title:`포스팅 ${n}`,date:d.toISOString().slice(0,10),time:slots[i]});n++;}d.setDate(d.getDate()+1)}state.schedule=list;store.set('ads_schedule',list);drawSchedule()}; drawSchedule();}
  function drawSchedule(){const el=$('#scheduleList'); if(!el)return; if(!state.schedule.length){el.innerHTML='';return} const grouped={}; state.schedule.forEach(p=>(grouped[p.date]??=[]).push(p)); el.innerHTML=`<div class="card"><div class="title">📋 발행 스케줄 (${state.schedule.length}개)</div><div style="max-height:400px;overflow:auto">${Object.keys(grouped).map(d=>`<div><div class="schedule-day">${d}</div>${grouped[d].map(p=>`<div class="post-row"><div class="num">${p.id}</div><input class="input" style="margin:0;flex:1" value="${esc(p.title)}" data-title="${p.id}"><input type="time" value="${p.time}" data-time="${p.id}"></div>`).join('')}</div>`).join('')}</div><button id="saveSch" class="btn green">💾 스케줄 저장</button></div>`; document.querySelectorAll('[data-title]').forEach(i=>i.oninput=()=>{state.schedule.find(p=>p.id==i.dataset.title).title=i.value;store.set('ads_schedule',state.schedule)}); document.querySelectorAll('[data-time]').forEach(i=>i.oninput=()=>{state.schedule.find(p=>p.id==i.dataset.time).time=i.value;store.set('ads_schedule',state.schedule)}); $('#saveSch').onclick=()=>{$('#saveSch').textContent='✅ 저장 완료!';store.set('ads_schedule',state.schedule)};}
  function renderPrompt(){ $('#app').innerHTML=`<div class="card"><div class="title">💡 ChatGPT 프롬프트 템플릿</div><p class="small">Ollama 생성이 잘 안 될 때 수동으로 ChatGPT 등에 붙여넣는 예비용입니다.</p></div>${templates.map((t,i)=>`<div class="card template"><div class="row" style="justify-content:space-between"><div class="row"><span class="tag" style="background:${t[2]}">${t[1]}</span><b>${t[0]}</b></div><button class="pill" style="flex:0 0 auto;padding:7px 12px" data-copy="${i}">📋 복사</button></div><pre>${esc(t[3])}</pre></div>`).join('')}`; document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>{navigator.clipboard?.writeText(templates[+b.dataset.copy][3]);b.textContent='✅ 복사됨';setTimeout(()=>b.textContent='📋 복사',1500)});}
  function renderTracker(){const done=state.tracker.filter(p=>p.status==='발행완료').length,pct=Math.min(done/20*100,100); $('#app').innerHTML=`<div class="card" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff"><div class="title">🎯 애드센스 승인 목표</div><p>발행완료 ${done}/20개 (${Math.round(pct)}%)</p><div style="background:rgba(255,255,255,.25);height:10px;border-radius:8px"><div style="width:${pct}%;height:100%;background:#a7f3d0;border-radius:8px"></div></div></div><div class="card"><div class="title">📝 포스팅 목록</div><input id="trackTitle" class="input" placeholder="글 제목"><input id="trackDate" class="input" type="date"><button id="addTrack" class="btn">+ 추가</button><div id="trackList" style="margin-top:12px"></div></div>`; $('#addTrack').onclick=()=>{const title=$('#trackTitle').value.trim(),date=$('#trackDate').value;if(!title||!date)return;state.tracker.push({id:Date.now(),title,date,status:'작성완료'});store.set('ads_tracker',state.tracker);renderTracker()}; const list=$('#trackList'); list.innerHTML=state.tracker.length?state.tracker.map((p,i)=>`<div class="post-row"><div class="num">${i+1}</div><div style="flex:1"><b>${esc(p.title)}</b><br><small>${p.date}</small></div><button class="pill" style="flex:0 0 auto;padding:6px 10px" data-status="${p.id}">${p.status}</button><button class="pill" style="flex:0 0 auto;padding:6px 10px" data-del="${p.id}">✕</button></div>`).join(''):'<p class="small">아직 포스팅이 없습니다.</p>'; document.querySelectorAll('[data-status]').forEach(b=>b.onclick=()=>{const p=state.tracker.find(x=>x.id==b.dataset.status);p.status=p.status==='발행완료'?'작성완료':'발행완료';store.set('ads_tracker',state.tracker);renderTracker()}); document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{state.tracker=state.tracker.filter(x=>x.id!=b.dataset.del);store.set('ads_tracker',state.tracker);renderTracker()});}
  render();
})();
</script>
</body>
</html>
