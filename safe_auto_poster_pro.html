<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Safe Auto Poster Pro</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f3f6ff;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #1f2937;
      padding-bottom: env(safe-area-inset-bottom);
    }

    button { transition: all .2s ease; }
    button:hover { opacity: .92; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    input, textarea, select { outline: none; }

    .container { max-width: 760px; margin: auto; padding: 16px; }

    .header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      padding: 30px 20px 74px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      background: white;
      padding: 6px;
      border-radius: 16px;
      margin-top: -44px;
      margin-bottom: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
    }

    .tab-btn {
      flex: 1;
      border: none;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      background: transparent;
      color: #6b7280;
    }

    .tab-btn.active {
      background: #4f46e5;
      color: white;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,.06);
    }

    .label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #4b5563;
    }

    .input {
      width: 100%;
      padding: 13px;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1.5px solid #dbe2ea;
      font-size: 14px;
    }

    .btn-main {
      width: 100%;
      border: none;
      padding: 14px;
      border-radius: 12px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-upload {
      width: 100%;
      border: none;
      padding: 14px;
      border-radius: 12px;
      background: #21759b;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    .preview {
      background: #f8fafc;
      border-radius: 14px;
      padding: 18px;
      margin-top: 18px;
    }

    .success {
      background: #dcfce7;
      color: #166534;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .small {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;
const TABS = ["✍️ 글 생성", "⚙️ 설정"];
const STORAGE_KEY = "SAFE_AUTO_POSTER_V2";

function App() {
  const [tab, setTab] = useState(0);
  const [config, setConfig] = useState({
    apiEndpoint: "",
    wordpressUrl: "",
    postStatus: "draft"
  });

  useEffect(() => {
    try {
      const saved = sessionStorage.getItem(STORAGE_KEY);
      if (saved) setConfig(JSON.parse(saved));
    } catch (err) {
      console.error(err);
    }
  }, []);

  const saveConfig = () => {
    try {
      sessionStorage.setItem(STORAGE_KEY, JSON.stringify(config));
      alert("설정 저장 완료.");
    } catch {
      alert("브라우저 저장 실패.");
    }
  };

  return (
    <>
      <div className="header">
        <div className="container">
          <h1 style={{margin:0}}>🚀 Safe Auto Poster Pro.</h1>
          <p style={{marginTop:8, opacity:.9}}>보안 강화 + 실운영 안정화 버전입니다.</p>
        </div>
      </div>

      <div className="container">
        <div className="tabs">
          {TABS.map((item, idx) => (
            <button
              key={idx}
              className={`tab-btn ${tab === idx ? "active" : ""}`}
              onClick={() => setTab(idx)}
            >
              {item}
            </button>
          ))}
        </div>

        {tab === 0 && <Generator config={config} />}
        {tab === 1 && <Settings config={config} setConfig={setConfig} saveConfig={saveConfig} />}
      </div>
    </>
  );
}

function Generator({ config }) {
  const [form, setForm] = useState({ category: "", keyword: "" });
  const [loading, setLoading] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");
  const [result, setResult] = useState(null);

  const isValidUrl = (url) => {
    try { new URL(url); return true; } catch { return false; }
  };

  const cleanWordpressUrl = (url) =>
    url.trim().replace("/wp-admin", "").replace(/\/$/, "");

  const validate = () => {
    if (!form.category.trim()) return "카테고리를 입력하세요.";
    if (!form.keyword.trim()) return "키워드를 입력하세요.";
    if (form.keyword.length < 2) return "키워드는 2자 이상이어야 합니다.";
    return null;
  };

  const generatePost = async () => {
    setError(""); setSuccess("");
    const validation = validate();
    if (validation) { setError(validation); return; }
    setLoading(true);
    try {
      await new Promise(resolve => setTimeout(resolve, 1200));
      const unsafeHtml = `
        <h2>${escapeHtml(form.keyword)}란?</h2>
        <p>${escapeHtml(form.keyword)} 핵심 내용을 정리했습니다.</p>
        <h2>주요 특징</h2>
        <ul>
          <li>초보자도 이해 가능합니다.</li>
          <li>실전 활용 중심입니다.</li>
          <li>최신 트렌드를 반영했습니다.</li>
        </ul>
        <h2>마무리.</h2>
        <p>충분한 정보를 검토한 뒤 활용하세요.</p>
      `;
      const cleanHtml = DOMPurify.sanitize(unsafeHtml);
      setResult({
        title: `[${form.category}] ${form.keyword} 완벽 가이드.`,
        excerpt: `${form.keyword} 핵심 내용을 정리한 실전 가이드입니다.`,
        content: cleanHtml
      });
      setSuccess("글 생성 완료.");
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  const uploadPost = async () => {
    if (!result) return;
    setError(""); setSuccess("");
    if (!config.apiEndpoint.trim()) { setError("백엔드 API 주소를 입력하세요."); return; }
    if (!isValidUrl(config.apiEndpoint)) { setError("올바른 API 주소를 입력하세요."); return; }
    if (!isValidUrl(config.wordpressUrl)) { setError("올바른 워드프레스 주소를 입력하세요."); return; }
    setUploading(true);
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 10000);
    try {
      const response = await fetch(config.apiEndpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        signal: controller.signal,
        body: JSON.stringify({
          wordpressUrl: cleanWordpressUrl(config.wordpressUrl),
          title: result.title,
          excerpt: result.excerpt,
          content: DOMPurify.sanitize(result.content),
          status: config.postStatus
        })
      });
      const text = await response.text();
      let data = {};
      try { data = JSON.parse(text); } catch { throw new Error("JSON 응답 파싱 실패."); }
      if (!response.ok) throw new Error(data.message || "업로드 실패.");
      setSuccess("워드프레스 업로드 성공.");
    } catch (err) {
      if (err.name === "AbortError") setError("요청 시간이 초과되었습니다.");
      else setError(err.message);
    } finally {
      clearTimeout(timeout);
      setUploading(false);
    }
  };

  return (
    <div className="card">
      {error && <div className="error">{error}</div>}
      {success && <div className="success">{success}</div>}

      <label className="label">카테고리.</label>
      <input
        className="input"
        value={form.category}
        maxLength={40}
        onChange={(e) => setForm({ ...form, category: e.target.value })}
        placeholder="예: IT, 건강."
      />

      <label className="label">메인 키워드.</label>
      <input
        className="input"
        value={form.keyword}
        maxLength={80}
        onChange={(e) => setForm({ ...form, keyword: e.target.value })}
        placeholder="예: 챗GPT 사용법."
      />

      <button className="btn-main" onClick={generatePost} disabled={loading}>
        {loading ? "✨ AI 작성 중입니다." : "🚀 글 생성하기."}
      </button>

      {result && (
        <div className="preview">
          <h3 style={{marginTop:0}}>{result.title}</h3>
          <p className="small">{result.excerpt}</p>
          <div dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(result.content) }} />
          <div style={{marginTop:20}}>
            <button className="btn-upload" onClick={uploadPost} disabled={uploading}>
              {uploading ? "🌐 업로드 중입니다." : "🌐 워드프레스 업로드."}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function Settings({ config, setConfig, saveConfig }) {
  return (
    <div className="card">
      <label className="label">백엔드 API 주소.</label>
      <input
        className="input"
        value={config.apiEndpoint}
        onChange={(e) => setConfig({ ...config, apiEndpoint: e.target.value })}
        placeholder="https://api.example.com/post"
      />

      <label className="label">워드프레스 주소.</label>
      <input
        className="input"
        value={config.wordpressUrl}
        onChange={(e) => setConfig({ ...config, wordpressUrl: e.target.value })}
        placeholder="https://myblog.com"
      />

      <label className="label">게시 상태.</label>
      <select
        className="input"
        value={config.postStatus}
        onChange={(e) => setConfig({ ...config, postStatus: e.target.value })}
      >
        <option value="draft">임시 저장.</option>
        <option value="publish">즉시 발행.</option>
      </select>

      <button className="btn-main" onClick={saveConfig}>💾 설정 저장.</button>
    </div>
  );
}

function escapeHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
